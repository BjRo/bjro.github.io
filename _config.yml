# Site Settings
locale                   : "en-US"
title                    : "Dude, where's my Kaizen?"
tagline                  : "Field notes on agentic engineering · Hamburg · MMXXVI"
description              : "Field notes on agentic engineering by Björn Rochel — independent coach, working with teams from Hamburg."
url                      : "https://bjro.github.io"
baseurl                  :

# SEO
google_site_verification : "Ao9ozZz4Tex8Qb6oHnI1UKlsjaJPuY0gBpB-EP_GquY"

# Social Sharing
og_image                 : "/assets/images/bjoern-portrait.png"
social:
  type                   : Person
  name                   : "Björn Rochel"
  links:
    - "https://www.linkedin.com/in/bj%C3%B6rn-rochel-51958a58/"
    - "https://github.com/bjro"

# Site Author
author:
  name             : "Björn Rochel"
  bio              : "independent coach for agentic engineering, working with teams from Hamburg."
  location         : "Hamburg"
  email            : "bjoern@bjro.de"
  linkedin         : "https://www.linkedin.com/in/bj%C3%B6rn-rochel-51958a58/"
  github           : "https://github.com/bjro"

# Reading Files
include:
  - _pages
exclude:
  - CLAUDE.md
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - mise.toml
  - README.md
  - .demos
  - .rodney
  - .claude

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:title/
paginate: 20
paginate_path: /page:num/
timezone:

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
