<aside class="bio">
  <div class="bio-mobile-row">
    <img class="portrait" src="{{ '/assets/images/bjoern-portrait.png' | relative_url }}" alt="{{ site.author.name }}" />
    <p class="tagline">{{ site.author.name }} — {{ site.author.bio }}</p>
  </div>
  <div class="icons">
    {% if site.author.linkedin %}<a aria-label="LinkedIn" href="{{ site.author.linkedin }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg></a>{% endif %}
    {% if site.author.github %}<a aria-label="GitHub" href="{{ site.author.github }}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg></a>{% endif %}
    {% if site.author.email %}<a aria-label="Email" href="mailto:{{ site.author.email }}">@</a>{% endif %}
  </div>
</aside>
